name: Request review on signal-check PR

# Opening a signal-check edition PR requests review from the EDCP Data and
# Research team, which notifies every member via GitHub.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request-review:
    # For pull_request, the top-level `branches:` filter matches the base ref
    # (main), not the head branch, so scope to the branch slug here instead.
    if: startsWith(github.head_ref, 'signal-check/')
    runs-on: ubuntu-latest
    steps:
      - name: Request review from EDCP Data and Research team
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              team_reviewers: ['edcp-data-and-research'],
            });
